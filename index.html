<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Geostadium</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }

    header {
      background: #111827;
      color: white;
      padding: 16px 20px;
    }

    h1 {
      margin: 0;
      font-size: 28px;
    }

    p {
      margin: 6px 0 0;
    }

    #map {
      height: calc(100vh - 86px);
      width: 100%;
    }
  </style>
</head>
<body>
  <header>
    <h1>Geostadium ⚽</h1>
    <p>Primer mapa interactivo</p>
  </header>

  <div id="map"></div>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <script>
    const map = L.map('map').setView([40.4168, -3.7038], 6);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    const marker = L.marker([40.4531, -3.6883]).addTo(map);
    marker.bindPopup('<b>Santiago Bernabéu</b><br>Marcador de prueba.');
  </script>
</body>
</html>
